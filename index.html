<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Optimization</title>
    <style>
        /* Modern CSS Reset & Anti-Copy */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }

        body {
            background-color: #030303; /* Lebih gelap dari hitam biasa */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Latar Belakang Gradasi Halus & Dinamis */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulse 6s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Kontainer Utama (Card Effect) */
        .container {
            width: 85%;
            max-width: 480px;
            text-align: center;
            z-index: 10;
            position: relative;
            background: rgba(10, 10, 10, 0.6);
            padding: 50px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* Efek Glassmorphism */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Lencana Status */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #f1c40f; /* Warna Amber/Kuning */
            border-radius: 50%;
            box-shadow: 0 0 10px #f1c40f;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Judul Besar & Gradasi */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Deskripsi */
        p.description {
            color: #777;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 45px;
            font-weight: 400;
        }

        /* Grid Timer Countdown */
        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Kotak Satuan Waktu */
        .time-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 22px 5px;
            border-radius: 16px;
            transition: border 0.3s, transform 0.3s;
        }

        .time-box:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        /* Angka */
        .number {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums; /* Angka tidak goyang */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Label (Hari, Jam, dll) */
        .label {
            display: block;
            font-size: 0.6rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        /* Progress Bar Halus */
        .progress-container {
            width: 100%;
            height: 3px;
            background-color: #111;
            border-radius: 3px;
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar {
            width: 70%; /* Simulasi loading */
            height: 100%;
            background: linear-gradient(90deg, #333 0%, #fff 50%, #333 100%);
            border-radius: 3px;
            animation: loading-shine 2s infinite linear;
        }
        
        @keyframes loading-shine {
            0% { background-position: -100px; }
            100% { background-position: 480px; }
        }

    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            System Optimization
        </div>

        <h1>izinn gueh tutup dulu ya</h1>
        <p class="description">sedang dalam peningkatan infrastruktur untuk performa yang lebih baik. Estimasi waktu tersisa :</p>

        <div id="countdown">
            <div class="time-box">
                <span class="number" id="d">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="h">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="m">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="s">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <script>
        /* ======================================================
           PENGATURAN TANGGAL TUJUAN - UBAH DI SINI
           Sangat mudah, format: YYYY, MM (Bulan 1-12), DD, HH, MM
           ====================================================== */
        const TAHUN   = 2026;
        const BULAN   = 4;   // 1=Januari, 4=April, 12=Desember
        const TANGGAL = 22;
        const JAM     = 10;  // Format 24 jam (misal 18 = 6 sore)
        const MENIT   = 0;
        /* ====================================================== */

        // Menghitung Target Waktu
        // JavaScript menggunakan Bulan 0-11, jadi BULAN - 1
        const targetDate = new Date(TAHUN, BULAN - 1, TANGGAL, JAM, MENIT).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Jika waktu sudah lewat
            if (difference < 0) {
                document.getElementById("countdown").innerHTML = "<div style='grid-column: span 4; color: #555; font-size: 0.9rem; border: 1px solid #222; padding: 15px; border-radius: 10px; background: #0a0a0a;'>Update selesai, silahkan refresh halaman.</div>";
                document.querySelector('h1').innerText = "UPDATE COMPLETED";
                document.querySelector('.description').innerText = "Infrastruktur KH1 telah berhasil ditingkatkan.";
                clearInterval(interval);
                return;
            }

            // Kalkulasi Waktu
            const daysArr = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hoursArr = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutesArr = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const secondsArr = Math.floor((difference % (1000 * 60)) / 1000);

            // Update HTML dengan padding 0 (misal '9' jadi '09')
            document.getElementById("d").innerText = String(daysArr).padStart(2, '0');
            document.getElementById("h").innerText = String(hoursArr).padStart(2, '0');
            document.getElementById("m").innerText = String(minutesArr).padStart(2, '0');
            document.getElementById("s").innerText = String(secondsArr).padStart(2, '0');
        }

        // Jalankan timer setiap detik
        updateCountdown();
        const interval = setInterval(updateCountdown, 1000);

        // Proteksi Tambahan: Blokir Inspect Element (Ctrl+Shift+I, F12)
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
            if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false; // Ctrl+S
        }
    </script>
</body>
</html>
