<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        /* Modern Reset & Anti-Copy */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            /* Mematikan gesture zoom bawaan browser */
            touch-action: pan-x pan-y; 
        }

        :root {
            --primary-glow: #ffffff;
            --accent-color: #007AFF; 
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 122, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 60px 40px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
            font-weight: 600;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 12px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff 40%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #888;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
        }

        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 0;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .number {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 2px;
        }

        .label {
            font-size: 0.55rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-wrapper {
            margin-top: 50px;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            background-size: 200% 100%;
            animation: shine 3s infinite linear;
            transition: width 1s ease-in-out;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>

    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            System Upgrading
        </div>

        <h1>tunggu ya rek</h1>
        <p class="description">Kami sedang memperkuat mesin agar pengalamanmu lebih kencang dan stabil.</p>

        <div id="countdown">
            <div class="time-box">
                <span class="number" id="d">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="h">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="m">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="s">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
        
        <div class="progress-wrapper">
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <p class="footer-note">OPTIMIZING SERVER INFRASTRUCTURE</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIG TARGET DATE ---
        const TAHUN   = 2026;
        const BULAN   = 4;
        const TANGGAL = 29;
        const JAM     = 10;
        const MENIT   = 0;

        const targetDate = new Date(TAHUN, BULAN - 1, TANGGAL, JAM, MENIT).getTime();
        const startDate = new Date().getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const totalDuration = targetDate - startDate;
            const remaining = targetDate - now;

            if (remaining < 0) {
                document.getElementById("countdown").innerHTML = "<div style='grid-column: span 4; color: #888; font-size: 0.9rem;'>Upgrade Selesai. Silahkan muat ulang.</div>";
                document.querySelector('h1').innerText = "We're Back!";
                document.getElementById("p-bar").style.width = "100%";
                clearInterval(interval);
                return;
            }

            const d = Math.floor(remaining / (1000 * 60 * 60 * 24));
            const h = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((remaining % (1000 * 60)) / 1000);

            document.getElementById("d").innerText = String(d).padStart(2, '0');
            document.getElementById("h").innerText = String(h).padStart(2, '0');
            document.getElementById("m").innerText = String(m).padStart(2, '0');
            document.getElementById("s").innerText = String(s).padStart(2, '0');

            const progress = ((totalDuration - remaining) / totalDuration) * 100;
            document.getElementById("p-bar").style.width = Math.max(10, progress) + "%";
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();

        // --- 2. ANTI-ZOOM & SECURITY SCRIPT ---

        // Mencegah Zoom melalui Keyboard (Ctrl +/-/0)
        document.addEventListener('keydown', function (e) {
            // Block Inspect Elements & View Source
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && [85, 83].includes(e.keyCode))) {
                e.preventDefault();
            }
            // Block Zoom Keys
            if (e.ctrlKey && [61, 107, 173, 109, 187, 189, 48].includes(e.keyCode)) {
                e.preventDefault();
            }
        });

        // Mencegah Zoom melalui Mouse Wheel (Ctrl + Scroll)
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Mencegah Zoom melalui Gesture Pinch (Touchpad/Mobile)
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== undefined && e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Tambahan untuk Safari/Chrome iOS
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
