<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TJKT Nexus | Platinum</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-body: #050505;
      --bg-sidebar: #0f0f0f;
      --bg-card: #1a1a1a;
      --text-main: #ffffff;
      --text-muted: #888888;
      --accent: #ffffff;
      --danger: #ff3b3b;
      --border-color: rgba(255,255,255,0.08);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 11000; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: #fff; color: #000; padding: 14px 24px; border-radius: 16px; font-size: 13px;
      font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: toastIn 0.6s var(--ease) forwards;
    }
    @keyframes toastIn { from { transform: translateX(100%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
    .toast.fade-out { animation: toastOut 0.5s var(--ease) forwards; }
    @keyframes toastOut { to { transform: translateX(100%); opacity: 0; } }

    .sidebar {
      width: 300px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; padding: 24px 18px;
      transition: all 0.5s var(--ease); z-index: 1000; position: relative;
    }

    .close-hint {
      font-size: 9px; color: var(--text-muted); text-align: center;
      margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; padding: 8px; border-radius: 12px; transition: 0.3s;
    }

    .new-chat-btn {
      width: 100%; padding: 16px; background: #ffffff; border: none;
      color: #000; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 12px; font-weight: 800; font-size: 13px; margin-bottom: 25px;
    }

    #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

    .history-item-wrapper { position: relative; display: flex; align-items: center; width: 100%; margin-bottom: 2px; }
    .history-item {
      flex: 1; padding: 14px 45px 14px 16px; border-radius: 12px; font-size: 13px;
      color: var(--text-muted); cursor: pointer; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; transition: 0.3s var(--ease);
    }
    .history-item.active { background: rgba(255,255,255,0.07); color: #fff; font-weight: 600; }

    .delete-session-btn { 
      position: absolute; right: 8px; width: 32px; height: 32px; 
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 68, 68, 0.1); border: none; color: var(--danger); 
      cursor: pointer; z-index: 10; opacity: 1; transition: 0.2s; border-radius: 8px;
    }
    .delete-session-btn:hover { background: var(--danger); color: #fff; transform: scale(1.05); }

    .auto-clean-btn {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid var(--border-color); color: var(--text-muted);
      border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 10px; margin-top: 15px;
    }

    .sidebar-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      display: none; z-index: 999; opacity: 0; transition: opacity 0.5s var(--ease);
    }
    .sidebar-overlay.active { display: block; opacity: 1; }

    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-body); position: relative; }
    header {
      padding: 18px 24px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color);
      z-index: 10;
    }
    .brand h1 { font-size: 15px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

    #chat { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 24px; }
    .msg { max-width: 85%; animation: messageIn 0.5s var(--ease) forwards; }
    @keyframes messageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { align-self: flex-end; }
    .msg.nexus { align-self: flex-start; width: 100%; }
    
    .bubble { padding: 16px 20px; border-radius: 20px; font-size: 14.5px; line-height: 1.6; }
    .nexus .bubble { background: var(--bg-card); color: #f0f0f0; border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
    .user .bubble { background: #ffffff; color: #000; font-weight: 600; border-bottom-right-radius: 4px; }

    .input-area { padding: 24px; background: linear-gradient(to top, var(--bg-body) 70%, transparent); }
    .input-container {
      max-width: 850px; margin: 0 auto; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color); border-radius: 20px;
      padding: 8px 10px 8px 22px; display: flex; align-items: center; backdrop-filter: blur(10px);
    }
    #input { flex: 1; background: transparent; border: none; outline: none; color: white; height: 48px; }
    .send { width: 44px; height: 44px; border: none; border-radius: 14px; background: #fff; color: #000; cursor: pointer; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center; z-index: 10000;
    }
    .modal-card {
      background: var(--bg-sidebar); padding: 35px; border-radius: 32px;
      width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--border-color);
    }

    .typing-cursor::after {
        content: ''; display: inline-block; width: 8px; height: 15px;
        background: #fff; margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -300px; height: 100%; top: 0; width: 300px; }
      .sidebar.active { transform: translateX(300px); }
    }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="modal-overlay" id="customModal">
    <div class="modal-card">
      <div style="background: rgba(255,68,68,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <i class="fas fa-trash-alt" style="color:var(--danger); font-size: 24px;"></i>
      </div>
      <h3 style="margin-bottom:10px; font-weight: 800;">Hapus Chat?</h3>
      <p style="color:var(--text-muted); font-size:13px; margin-bottom:25px;">Semua pesan ini akan hilang permanen.</p>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="new-chat-btn" style="background:var(--danger); color:white; margin-bottom:0;" id="modalConfirmBtn">Hapus Sekarang</button>
        <button class="new-chat-btn" style="background:rgba(255,255,255,0.05); color:white; margin-bottom:0;" onclick="closeModal()">Batalkan</button>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="close-hint" onclick="toggleSidebar()">
        <i class="fas fa-arrow-left"></i> &nbsp; Tutup Menu
    </div>
    <button class="new-chat-btn" onclick="startNewChat()"><i class="fas fa-plus"></i> Sesi Baru</button>
    <div id="history-list"></div>
    <button class="auto-clean-btn" onclick="autoCleanSystem()">
        <i class="fas fa-shield-virus"></i> &nbsp; OPTIMASI SISTEM
    </button>
  </div>

  <div class="main-content">
    <header>
      <i class="fas fa-align-left" style="cursor:pointer; font-size: 18px;" onclick="toggleSidebar()"></i>
      <div class="brand"><h1>TJKT Nexus</h1></div>
      <div style="font-size: 9px; opacity: 0.6; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 6px;">PLATINUM</div>
    </header>
    <div id="chat"></div>
    <div class="input-area">
      <div id="status" style="display:none; font-size:10px; color:var(--text-muted); margin-bottom:12px; margin-left:10px; font-weight: 600;">
        <i class="fas fa-circle-notch fa-spin"></i> &nbsp;MEMPROSES...
      </div>
      <div class="input-container">
        <input id="input" type="text" placeholder="Ketik pertanyaan TJKT..." autocomplete="off">
        <button class="send" onclick="gas()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script>
    const API_KEYS = [
        "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", 
        "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", 
        "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"
    ];
    let currentKeyIndex = 0;
    let allSessions = JSON.parse(localStorage.getItem("nexus_sessions")) || {};
    let currentSessionId = "";
    let isWaiting = false;

    function showToast(msg) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.add("fade-out"); setTimeout(() => toast.remove(), 500); }, 3000);
    }

    function autoCleanSystem() {
        localStorage.removeItem("nexus_sessions");
        allSessions = {};
        startNewChat();
        showToast("Sistem Dioptimasi!");
    }

    function openModal(confirmCallback) {
        const overlay = document.getElementById("customModal");
        overlay.style.display = "flex";
        document.getElementById("modalConfirmBtn").onclick = () => { confirmCallback(); closeModal(); };
    }

    function closeModal() { document.getElementById("customModal").style.display = "none"; }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("sidebarOverlay").classList.toggle("active");
    }

    function saveSessions() { localStorage.setItem("nexus_sessions", JSON.stringify(allSessions)); renderHistory(); }

    function renderHistory() {
      const list = document.getElementById("history-list");
      list.innerHTML = "";
      Object.keys(allSessions).reverse().forEach(id => {
        const wrapper = document.createElement("div");
        wrapper.className = "history-item-wrapper";
        const title = (allSessions[id] && allSessions[id].length > 1) ? allSessions[id][1].content : "Chat Baru";
        wrapper.innerHTML = `
          <div class="history-item ${id === currentSessionId ? 'active' : ''}" onclick="loadSession('${id}')">${title}</div>
          <button class="delete-session-btn" onclick="event.stopPropagation(); triggerDelete('${id}')">
            <i class="fas fa-trash"></i>
          </button>`;
        list.appendChild(wrapper);
      });
    }

    function triggerDelete(id) {
        openModal(() => {
            delete allSessions[id];
            saveSessions();
            if (currentSessionId === id) startNewChat();
            showToast("Sesi dihapus.");
        });
    }

    function startNewChat() {
      currentSessionId = "session_" + Date.now();
      allSessions[currentSessionId] = [];
      document.getElementById("chat").innerHTML = "";
      print("nexus", "Halo! Saya TJKT Nexus. Ada yang bisa dibantu seputar pelajaran TJKT?");
      saveSessions();
    }

    function loadSession(id) {
      currentSessionId = id;
      document.getElementById("chat").innerHTML = "";
      (allSessions[id] || []).forEach(msg => print(msg.role === "assistant" ? "nexus" : "user", msg.content, false, false));
      renderHistory();
      if(window.innerWidth <= 768) toggleSidebar();
    }

    function print(role, content, save = true, animate = true) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      if (role === "nexus" && animate) {
        div.innerHTML = `<div class="bubble typing-cursor"></div>`;
        chat.appendChild(div);
        typeWriter(div.querySelector(".bubble"), content);
      } else {
        div.innerHTML = `<div class="bubble">${content}</div>`;
        chat.appendChild(div);
      }
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
      if (save) { 
          if(!allSessions[currentSessionId]) allSessions[currentSessionId] = [];
          allSessions[currentSessionId].push({ role: role === "nexus" ? "assistant" : "user", content }); 
          saveSessions(); 
      }
    }

    function typeWriter(element, text) {
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i); i++;
          document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
          setTimeout(typing, 10);
        } else { element.classList.remove("typing-cursor"); }
      }
      typing();
    }

    // LOGIKA UTAMA: GAS DENGAN AUTO KEY ROTATION
    async function gas() {
      if (isWaiting) return;
      const input = document.getElementById("input");
      const promptText = input.value.trim();
      if (!promptText) return;

      isWaiting = true;
      print("user", promptText);
      input.value = "";
      document.getElementById("status").style.display = "block";

      // Fungsi internal untuk fetch dengan rotasi key otomatis
      async function attemptFetch(attemptCount = 0) {
        // Jika semua kunci sudah dicoba dan gagal semua
        if (attemptCount >= API_KEYS.length) {
          document.getElementById("status").style.display = "none";
          print("nexus", "Maaf, seluruh akses API Nexus saat ini sedang limit. Silakan coba lagi beberapa saat lagi.");
          isWaiting = false;
          return;
        }

        try {
          const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Authorization": `Bearer ${API_KEYS[currentKeyIndex]}`, 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile",
              messages: [
                { role: "system", content: "Kamu adalah TJKT Nexus, pakar Teknik Komputer Jaringan & Coding. Fokus pada materi sekolah TJKT (Cyber security, Cisco, Windows, Mikrotik, Linux, Web Dev). Jika ada yang nanya yang lain bilang saya tidak tahu. Jika bukan topik TJKT, tolak dengan sopan." }, 
                { role: "user", content: promptText }
              ]
            })
          });

          // Jika API Key limit (biasanya 429 atau 401)
          if (!res.ok) throw new Error("Key Error");

          const data = await res.json();
          document.getElementById("status").style.display = "none";
          print("nexus", data.choices[0].message.content);
          isWaiting = false;

        } catch (err) {
          console.error(`Gagal menggunakan Key indeks ${currentKeyIndex}. Mencoba key berikutnya...`);
          
          // ROTASI KE KEY BERIKUTNYA
          currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
          
          // Coba lagi secara otomatis
          await attemptFetch(attemptCount + 1);
        }
      }

      await attemptFetch();
    }

    document.getElementById("input").addEventListener("keypress", (e) => { if(e.key === "Enter") gas(); });
    window.onload = () => { if (Object.keys(allSessions).length > 0) loadSession(Object.keys(allSessions).pop()); else startNewChat(); };
  </script>
</body>
</html>
